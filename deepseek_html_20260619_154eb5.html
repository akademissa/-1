<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивные примеры</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Сброс стилей */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Основной контейнер с фоном */
        .interactive-container {
            position: relative;
            width: 100%;
            max-width: 1932px;
            aspect-ratio: 1932 / 857;
            /* Замените URL на вашу картинку */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1932" height="857"><rect width="1932" height="857" fill="%231a1a4e"/><circle cx="300" cy="200" r="3" fill="white" opacity="0.6"/><circle cx="800" cy="100" r="2" fill="white" opacity="0.4"/><circle cx="1500" cy="300" r="4" fill="white" opacity="0.7"/></svg>');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Обертка вокруг контента */
        .content-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 20px;
            position: relative;
            z-index: 10;
        }

        /* КОНТЕЙНЕР (Уменьшен в 2 раза) */
        .glass-container {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 20px 25px;
            width: 35%;
            max-width: 550px;
            min-height: 150px; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start; /* Выравнивание всего контента по левому краю */
            text-align: left;
        }

        .glass-container h2 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            width: 100%;
            text-align: left;
        }

        /* Область для анимации текста */
        .slider-viewport {
            overflow: hidden;
            width: 100%;
            position: relative;
            min-height: 200px;
            display: flex;
            align-items: center;
        }

        /* Слайд с текстом */
        .text-slide {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            
            font-size: 15px;
            font-weight: 400;
            color: #ffffff;
            line-height: 1.4;
            white-space: pre-wrap;
            text-align: left; /* Текст выровнен по левому краю */
            
            /* Анимация (0.6s) */
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateX(100%) scale(0.95);
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            transform: translateX(100%) translateY(-50%) scale(0.95);
        }

        .text-slide.active {
            position: relative;
            top: auto;
            opacity: 1;
            transform: translateX(0) translateY(0) scale(1);
        }

        .text-slide.exit-left {
            transform: translateX(-100%) translateY(-50%) scale(0.95);
            opacity: 0;
            position: absolute;
            top: 50%;
        }
        
        .text-slide.exit-right {
            transform: translateX(100%) translateY(-50%) scale(0.95);
            opacity: 0;
            position: absolute;
            top: 50%;
        }

        /* Заголовок слайда */
        .slide-title {
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 8px;
            color: #ffffff;
            text-align: left;
            width: 100%;
        }

        /* Стили для списка с иконками */
        .list-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 2px;
            text-align: left;
            width: 100%;
        }

        .list-icon {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
            margin-top: 4px;
        }

        /* Блок с выводом (Логика) - строгое выравнивание по левому краю */
        .logic-container {
            margin-top: 10px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            border-left: 2px solid #4fc3f7;
            
            /* Убеждаемся, что контент внутри начинается слева */
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            
            align-self: flex-start;
            width: 100%;
            font-size: 14px;
        }

        .logic-label {
            font-weight: 700;
            color: #4fc3f7;
        }

        .logic-text {
            color: #ffffff;
        }

        /* Круглые кнопки */
        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .nav-btn:hover:not(:disabled) {
            background: #ffffff;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .nav-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: rgba(200, 200, 200, 0.4);
            transform: none !important;
            box-shadow: none !important;
        }

        .arrow-icon {
            width: 22px;
            height: 22px;
            fill: #1a1a2e;
        }

        /* Адаптивность */
        @media (max-width: 1024px) {
            .glass-container { width: 45%; padding: 15px 20px; min-height: 120px; }
            .slide-title { font-size: 22px; }
            .text-slide { font-size: 13px; }
        }

        @media (max-width: 768px) {
            .content-wrapper { gap: 10px; }
            .glass-container { width: 70%; padding: 10px 15px; min-height: 100px; }
            .slide-title { font-size: 20px; margin-bottom: 5px; }
            .text-slide { font-size: 11px; line-height: 1.2; }
            .nav-btn { width: 35px; height: 35px; }
            .arrow-icon { width: 16px; height: 16px; }
            .list-icon { width: 11px; height: 11px; }
            .logic-container { padding: 4px 8px; margin-top: 5px; font-size: 11px; }
            .interactive-container { padding: 15px; border-radius: 10px; }
        }
    </style>
</head>
<body>

    <div class="interactive-container" id="mainContainer">
        
        <div class="content-wrapper">
            <!-- Кнопка НАЗАД -->
            <button class="nav-btn" id="prevBtn" aria-label="Предыдущий пример" disabled>
                <svg class="arrow-icon" viewBox="0 0 24 24">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"></path>
                </svg>
            </button>

            <!-- Стеклянный контейнер -->
            <div class="glass-container">
                <h2>Примеры:</h2>
                <div class="slider-viewport" id="sliderViewport">
                    <!-- Слайды вставятся через JS -->
                </div>
            </div>

            <!-- Кнопка ВПЕРЕД -->
            <button class="nav-btn" id="nextBtn" aria-label="Следующий пример">
                <svg class="arrow-icon" viewBox="0 0 24 24">
                    <path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"></path>
                </svg>
            </button>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // SVG иконка кривой стрелки (смотрит слева направо)
            const arrowIcon = `<svg class="list-icon" viewBox="0 0 24 24"><path d="M8 7h8M16 7l-3-3M16 7l-3 3M5 12h14M19 12l-3-3M19 12l-3 3M8 17h8M16 17l-3-3M16 17l-3 3"/></svg>`;

            // Функция форматирования текста в HTML
            function formatTextToHtml(textBlock) {
                const lines = textBlock.split('\n').filter(line => line.trim() !== '');
                let title = '';
                let items = [];
                let logic = '';

                lines.forEach(line => {
                    if (line.startsWith('Логика:')) {
                        logic = line.replace('Логика:', '').trim();
                    } else if (line.startsWith('- ')) {
                        items.push(line.replace('- ', ''));
                    } else {
                        title = line;
                    }
                });

                let html = `<div class="slide-title">${title}</div>`;
                
                if (items.length > 0) {
                    html += `<div style="margin-bottom: 2px; width: 100%;">`;
                    items.forEach(item => {
                        html += `<div class="list-item">${arrowIcon} <span>${item}</span></div>`;
                    });
                    html += `</div>`;
                }

                if (logic) {
                    html += `<div class="logic-container">
                                <span class="logic-label">Логика: </span>
                                <span class="logic-text">${logic}</span>
                             </div>`;
                }

                return html;
            }

            // Массив примеров
            const rawExamples = [
                `Отдел продаж:
- Количество клиентов (потенциальных и действующих)
- Среднее количество сделок или заявок на одного продавца
- Объём продаж (в штуках, деньгах или клиентах)
- Количество встреч, звонков или писем, необходимых для заключения сделки
Логика: чем больше клиентов и операций, тем выше нагрузка на менеджеров по продажам.`,
                
                `Служба поддержки / контакт-центр:
- Количество входящих обращений (звонков, писем, чатов)
- Среднее время обработки запроса
- Уровень сервиса (SLA, требуемая скорость ответа)
- Процент обращений, требующих эскалации
Логика: рост обращений напрямую увеличивает потребность в операторах.`,
                
                `HR-отдел (кадры и подбор):
- Количество сотрудников или вакансий
- Средняя скорость закрытия вакансии
- Планируемый прирост/текучесть персонала
- Объём кадровых изменений (переводы, отпуска, командировки)
Логика: чем активнее кадровые процессы, тем больше нагрузка на HR-специалистов.`
            ];

            const examples = rawExamples.map(formatTextToHtml);

            const sliderViewport = document.getElementById('sliderViewport');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            let currentIndex = 0;
            let isAnimating = false;

            function createSlideElement(htmlContent, className = '') {
                const div = document.createElement('div');
                div.className = `text-slide ${className}`;
                div.innerHTML = htmlContent;
                return div;
            }

            function updateButtons() {
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === examples.length - 1;
            }

            function initSlider() {
                sliderViewport.innerHTML = '';
                const initialSlide = createSlideElement(examples[0], 'active');
                sliderViewport.appendChild(initialSlide);
                updateButtons();
            }

            function switchSlide(direction) {
                if (isAnimating) return;
                if (direction === 'next' && currentIndex === examples.length - 1) return;
                if (direction === 'prev' && currentIndex === 0) return;

                isAnimating = true;
                const currentActive = sliderViewport.querySelector('.text-slide.active');
                
                if (currentActive) {
                    currentActive.classList.remove('active');
                    currentActive.classList.add(direction === 'next' ? 'exit-left' : 'exit-right');
                }

                if (direction === 'next') {
                    currentIndex++;
                } else {
                    currentIndex--;
                }

                const newSlide = createSlideElement(examples[currentIndex]);
                const startTranslate = direction === 'next' ? '100%' : '-100%';
                newSlide.style.transform = `translateX(${startTranslate}) translateY(-50%) scale(0.95)`;
                newSlide.style.opacity = '0';
                sliderViewport.appendChild(newSlide);

                setTimeout(() => {
                    if (currentActive) {
                        currentActive.style.position = 'absolute'; 
                        currentActive.style.top = '50%';
                        currentActive.style.left = '0';
                        currentActive.style.width = '100%';
                    }

                    newSlide.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                    newSlide.style.transform = 'translateX(0) translateY(0) scale(1)';
                    newSlide.style.opacity = '1';
                    newSlide.classList.add('active');

                    updateButtons();

                    setTimeout(() => {
                        if (currentActive && currentActive.parentNode) {
                            currentActive.remove();
                        }
                        newSlide.style.position = 'relative'; 
                        newSlide.style.top = 'auto';
                        newSlide.style.transform = ''; 
                        newSlide.style.opacity = '';
                        isAnimating = false;
                    }, 600);

                }, 50);
            }

            nextBtn.addEventListener('click', () => switchSlide('next'));
            prevBtn.addEventListener('click', () => switchSlide('prev'));

            initSlider();
        });
    </script>
</body>
</html>
